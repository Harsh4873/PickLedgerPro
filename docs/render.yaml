services:
  - type: web
    name: pickledgerpro
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 8765
      - key: ENABLE_SPORTYTRADER_REMOTE
        value: "true"
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY_ID
        sync: false
      - key: FIREBASE_CLIENT_ID
        sync: false
      - key: ADMIN_PICKS_SECRET
        sync: false  # Set via environment or secrets manager; do not hardcode
    healthCheckPath: /health
